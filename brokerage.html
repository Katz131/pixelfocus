<!DOCTYPE html>
<!--
  =============================================================================
  BROKERAGE — Investment market for Todo of the Loom
  =============================================================================
  Full browser tab, NOT a Chrome extension popup. Opened via chrome.tabs.create.
  Reads/writes chrome.storage.local (pixelFocusState) like factory.js.

  Investment types:
    - STOCKS        — Loom-themed companies, realistic price movement
    - MUTUAL FUNDS  — Diversified, lower risk, steady growth
    - TREASURY BONDS— Guaranteed return, very safe, very slow
    - CRYPTO        — Extreme volatility, can moon or crash
    - GAMBLING      — Instant win/lose, pure luck

  Market simulation: prices update on page load + hourly tick.
  Unlockable tiers: start basic, unlock more as you trade.
  =============================================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo of the Loom — Brokerage</title>
<link rel="stylesheet" href="fonts.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* v3.23.294: Pixel-art themed scrollbars */
*::-webkit-scrollbar { width:10px; height:10px; }
*::-webkit-scrollbar-track { background:#0f0f1a; border-left:1px solid #2a2a4a; }
*::-webkit-scrollbar-thumb { background:linear-gradient(180deg,#00cc6a,#009950); border:2px solid #0f0f1a; border-radius:0; box-shadow:inset 1px 1px 0 rgba(0,255,136,0.3),inset -1px -1px 0 rgba(0,0,0,0.3); }
*::-webkit-scrollbar-thumb:hover { background:linear-gradient(180deg,#00ff88,#00cc6a); border-color:#1a1a2e; box-shadow:inset 1px 1px 0 rgba(0,255,136,0.5),inset -1px -1px 0 rgba(0,0,0,0.2),0 0 8px rgba(0,255,136,0.3); }
*::-webkit-scrollbar-thumb:active { background:linear-gradient(180deg,#008844,#006633); box-shadow:inset -1px -1px 0 rgba(0,255,136,0.2),inset 1px 1px 0 rgba(0,0,0,0.4); }
*::-webkit-scrollbar-corner { background:#0f0f1a; }
:root {
  --bg: #0a0a14;
  --surface: #12122a;
  --surface2: #1a1a3a;
  --accent: #00ff88;
  --accent2: #ff6b9d;
  --accent3: #4ecdc4;
  --gold: #ffd700;
  --gold-dim: #b8860b;
  --danger: #ff4466;
  --text: #e0e0e0;
  --text-dim: #5a5a7e;
  --border: #2a2a4a;
  --green: #00ff88;
  --red: #ff4466;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  padding: 0 0 60px;
}
.header {
  text-align: center;
  padding: 24px 16px 16px;
  border-bottom: 2px solid var(--border);
  background: linear-gradient(180deg, #0f0f2a 0%, var(--bg) 100%);
}
.header h1 {
  font-family: 'Press Start 2P', monospace;
  font-size: 18px;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(255,215,0,0.3);
  margin-bottom: 8px;
}
.header .subtitle {
  font-size: 11px;
  color: var(--text-dim);
}
.wallet-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
}
.wallet-bar .stat { display: flex; align-items: center; gap: 6px; }
.wallet-bar .label { color: var(--text-dim); }
.wallet-bar .val { color: var(--gold); }
.wallet-bar .val.green { color: var(--green); }
.wallet-bar .val.red { color: var(--red); }

/* Tab bar */
.tab-bar {
  display: flex;
  justify-content: center;
  gap: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0;
}
.tab-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  padding: 10px 16px;
  color: var(--text-dim);
  cursor: pointer;
  border: none;
  background: transparent;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-btn.locked { opacity: 0.3; cursor: not-allowed; }

/* Panels */
.panel { display: none; max-width: 900px; margin: 0 auto; padding: 20px 16px; }
.panel.active { display: block; }

/* Stock cards */
.stock-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
  transition: border-color 0.2s;
}
.stock-card:hover { border-color: var(--gold-dim); }
.stock-row { display: flex; align-items: center; gap: 12px; }
.stock-ticker {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  color: var(--accent3);
  min-width: 50px;
}
.stock-name { flex: 1; font-size: 13px; color: var(--text); }
.stock-price {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  min-width: 80px;
  text-align: right;
}
.stock-price.up { color: var(--green); }
.stock-price.down { color: var(--red); }
.stock-change {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  min-width: 70px;
  text-align: right;
}
.stock-change.up { color: var(--green); }
.stock-change.down { color: var(--red); }

/* Mini chart canvas */
.mini-chart { width: 100%; height: 60px; margin: 8px 0; }

/* Trade controls */
.trade-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.trade-input {
  width: 70px;
  padding: 4px 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  border-radius: 4px;
  text-align: center;
}
.trade-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  padding: 6px 12px;
  border: 1px solid;
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  transition: all 0.2s;
}
.trade-btn.buy { color: var(--green); border-color: var(--green); }
.trade-btn.buy:hover { background: rgba(0,255,136,0.15); }
.trade-btn.sell { color: var(--red); border-color: var(--red); }
.trade-btn.sell:hover { background: rgba(255,68,102,0.15); }
.trade-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.trade-info { font-size: 10px; color: var(--text-dim); margin-left: auto; }
.holding-badge {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--gold);
  background: rgba(255,215,0,0.1);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  padding: 3px 8px;
}

/* Bond cards */
.bond-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
}
.bond-card .rate {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--accent3);
}
.bond-card .maturity { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* Gambling */
.gamble-area {
  text-align: center;
  padding: 32px 16px;
}
.gamble-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  padding: 16px 32px;
  border: 2px solid var(--gold);
  color: var(--gold);
  background: transparent;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  margin: 8px;
}
.gamble-btn:hover { background: rgba(255,215,0,0.1); box-shadow: 0 0 20px rgba(255,215,0,0.2); }
.gamble-result {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  margin-top: 16px;
  min-height: 24px;
}

/* Portfolio */
.portfolio-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.portfolio-table th {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--text-dim);
  text-align: left;
  padding: 8px 6px;
  border-bottom: 1px solid var(--border);
}
.portfolio-table td {
  padding: 8px 6px;
  border-bottom: 1px solid rgba(42,42,74,0.5);
}
.portfolio-total {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  color: var(--gold);
  text-align: center;
  padding: 16px;
  margin-top: 16px;
  background: var(--surface);
  border: 1px solid var(--gold-dim);
  border-radius: 8px;
}

/* Market news ticker */
.news-ticker {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 6px 16px;
  font-size: 11px;
  color: var(--gold);
  text-align: center;
  overflow: hidden;
  white-space: nowrap;
}

/* Section headers */
.section-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* Back button — Duolingo-style juicy hover */
.back-btn {
  display: inline-block;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 10px 20px;
  background: var(--surface);
  color: var(--accent3);
  border: 1px solid var(--accent3);
  border-bottom: 4px solid rgba(78,205,196,0.4);
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, background 0.2s, border-color 0.2s;
  position: relative;
  overflow: hidden;
}
.back-btn:hover {
  transform: scale(1.08) translateY(-2px);
  box-shadow: 0 0 18px rgba(78,205,196,0.3), 0 4px 12px rgba(0,0,0,0.3);
  background: rgba(78,205,196,0.12);
  border-color: var(--accent3);
}
.back-btn:active {
  transform: scale(0.96) translateY(1px);
  box-shadow: 0 0 6px rgba(78,205,196,0.15);
  border-bottom-width: 1px;
}
.back-btn::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(78,205,196,0.12), transparent);
  transition: left 0.4s;
  pointer-events: none;
}
.back-btn:hover::after { left: 120%; }

/* Acumen system (v3.23.79) */
.acumen-val { color: #c084fc !important; }
.upgrade-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin-bottom: 12px; transition: all 0.3s;
}
.upgrade-card.owned { border-color: #7c3aed; }
.upgrade-card.locked { opacity: 0.45; }
.upgrade-card.affordable { border-color: #c084fc; box-shadow: 0 0 12px rgba(192,132,252,0.15); }
.upgrade-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.upgrade-title { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--text); flex: 1; }
.upgrade-cost { font-family: 'Press Start 2P', monospace; font-size: 9px; color: #c084fc; }
.upgrade-cost.got { color: var(--green); }
.upgrade-desc { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 10px; }
.upgrade-effect {
  font-size: 11px; color: var(--accent3); padding: 6px 10px;
  background: rgba(78,205,196,0.08); border-radius: 4px;
  border-left: 3px solid var(--accent3); margin-bottom: 10px;
}
.upgrade-buy-btn {
  font-family: 'Press Start 2P', monospace; font-size: 8px;
  padding: 8px 16px; border: 1px solid #c084fc; border-radius: 4px;
  cursor: pointer; background: rgba(192,132,252,0.1); color: #c084fc; transition: all 0.2s;
}
.upgrade-buy-btn:hover { background: rgba(192,132,252,0.25); }
.upgrade-buy-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.upgrade-buy-btn.owned-btn { border-color: var(--green); color: var(--green); background: rgba(0,255,136,0.08); cursor: default; }
.ach-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
}
.ach-card.earned { border-color: #7c3aed; background: rgba(192,132,252,0.05); }
.ach-name { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--text); margin-bottom: 4px; }
.ach-desc { font-size: 11px; color: var(--text-dim); }
.ach-reward { font-family: 'Press Start 2P', monospace; font-size: 9px; color: #c084fc; white-space: nowrap; }
.ach-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.ach-fill { height: 100%; background: #c084fc; border-radius: 2px; transition: width 0.5s; }
.sentiment-pill {
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  padding: 2px 6px; border-radius: 3px; margin-left: 8px;
}
.sent-bull { color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
.sent-bear { color: var(--red); border: 1px solid rgba(255,68,102,0.3); }
.sent-flat { color: var(--text-dim); border: 1px solid var(--border); }
.acumen-toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: rgba(192,132,252,0.95); color: #fff;
  font-family: 'Press Start 2P', monospace; font-size: 9px;
  padding: 10px 20px; border-radius: 6px; z-index: 9999;
  transition: opacity 0.5s; pointer-events: none;
}

/* Deposit/withdraw bar */
.deposit-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  padding: 8px;
  background: rgba(255,215,0,0.03);
  border-bottom: 1px solid var(--border);
}
.deposit-bar input {
  width: 100px;
  padding: 4px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--gold);
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  border-radius: 4px;
  text-align: center;
}
.deposit-bar button {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  transition: all 0.2s;
}
.deposit-btn { color: var(--green); border: 1px solid var(--green); }
.deposit-btn:hover { background: rgba(0,255,136,0.1); }
.withdraw-btn { color: var(--accent3); border: 1px solid var(--accent3); }
.withdraw-btn:hover { background: rgba(78,205,196,0.1); }

/* Quantity preset buttons */
.qty-presets {
  display: inline-flex;
  gap: 2px;
  margin: 0 4px;
}
.qty-preset-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  padding: 3px 5px;
  background: rgba(255,215,0,0.06);
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1;
}
.qty-preset-btn:hover {
  color: var(--gold);
  border-color: var(--gold-dim);
  background: rgba(255,215,0,0.15);
}
.qty-preset-btn:active {
  transform: scale(0.9);
  background: rgba(255,215,0,0.3);
}

/* Duolingo-style button press effects */
.trade-btn { position: relative; }
.trade-btn:active { transform: scale(0.93); }
.trade-btn.buy:active {
  background: rgba(0,255,136,0.3);
  box-shadow: 0 0 12px rgba(0,255,136,0.2);
}
.trade-btn.sell:active {
  background: rgba(255,68,102,0.3);
  box-shadow: 0 0 12px rgba(255,68,102,0.2);
}
.stock-card:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.bond-card { transition: border-color 0.2s, transform 0.15s; }
.bond-card:hover { border-color: var(--gold-dim); transform: translateY(-1px); }

/* Portfolio sell controls */
.pf-sell-qty {
  width: 40px !important;
  font-size: 8px !important;
  padding: 2px 3px !important;
}
</style>
</head>
<body>

<div style="padding:12px 16px 0;">
  <button class="back-btn" id="backBtnTop" title="Close the brokerage and return to the main extension.">&larr; BACK</button>
  <button type="button" id="tutorialBtn" title="Open the brokerage tutorial" style="float:right;background:rgba(78,205,196,0.1);border:2px solid rgba(78,205,196,0.5);color:#4ecdc4;font-family:'Press Start 2P',monospace;font-size:9px;padding:6px 12px;border-radius:8px;cursor:pointer;letter-spacing:1px;transition:background 0.15s,border-color 0.15s,transform 0.1s;box-shadow:0 2px 0 rgba(78,205,196,0.3),0 3px 6px rgba(0,0,0,0.2);">&#127891; TUTORIAL</button>
</div>

<div class="header">
  <h1>BROKERAGE</h1>
  <div class="subtitle">Invest your hard-earned money. Or lose it trying.</div>
</div>

<div class="wallet-bar">
  <div class="stat" title="Your main money balance from the extension. Deposit money here to trade."><span class="label">WALLET:</span><span class="val" id="walletCoins">0</span></div>
  <div class="stat" title="Cash available inside the brokerage for buying stocks, funds, crypto, and gambling. Deposit money from your wallet to add more."><span class="label">BROKERAGE CASH:</span><span class="val" id="brokerageCash">0</span></div>
  <div class="stat" title="Total current market value of all your holdings — stocks, funds, crypto, and active bonds combined."><span class="label">PORTFOLIO:</span><span class="val" id="portfolioVal">0</span></div>
  <div class="stat" title="Profit or Loss — the difference between what you paid for your investments and what they are worth now. Green = profit, Red = loss."><span class="label">P/L:</span><span class="val" id="totalPL">0</span></div>
  <div class="stat" title="Acumen points earned from trading activity and achievements. Spend these on permanent brokerage upgrades in the UPGRADES tab."><span class="label">ACUMEN:</span><span class="val" id="acumenVal" style="color:#c084fc;">0</span></div>
</div>

<div class="deposit-bar">
  <span style="font-size:10px;color:var(--text-dim);">Transfer:</span>
  <input type="number" id="transferAmt" value="100" min="1" step="100" title="Enter the amount to transfer between your wallet and the brokerage.">
  <button class="deposit-btn" id="depositBtn" title="Move money from your wallet INTO the brokerage so you can trade.">DEPOSIT &rarr;</button>
  <button class="withdraw-btn" id="withdrawBtn" title="Move money from the brokerage back INTO your wallet.">&larr; WITHDRAW</button>
</div>

<div id="newsTicker" class="news-ticker" title="Market news ticker — random headlines cycle through to set the mood. Purely cosmetic.">Welcome to the Brokerage. Markets are open.</div>

<div class="tab-bar">
  <button class="tab-btn active" data-panel="stocks" title="Buy and sell Loom-themed stocks with realistic price movement.">STOCKS</button>
  <button class="tab-btn" data-panel="funds" title="Invest in diversified mutual funds — lower risk, steady growth.">FUNDS</button>
  <button class="tab-btn" data-panel="bonds" title="Treasury bonds — guaranteed returns, very safe, very slow.">BONDS</button>
  <button class="tab-btn" data-panel="crypto" title="Cryptocurrency — extreme volatility, can moon or crash.">CRYPTO</button>
  <button class="tab-btn" data-panel="limitOrders" title="Set limit orders to auto-buy when prices drop to your target.">LIMITS</button>
  <button class="tab-btn" data-panel="portfolio" title="View all your current holdings, their values, and your overall profit/loss breakdown.">PORTFOLIO</button>
  <button class="tab-btn" data-panel="upgrades" style="color:#c084fc;border-color:#c084fc;" title="Spend Acumen points on permanent upgrades that improve your trading abilities and unlock new features.">UPGRADES</button>
</div>

<div class="panel active" id="stocksPanel">
  <div class="section-title">STOCK MARKET</div>
  <div id="stocksList"></div>
</div>

<div class="panel" id="fundsPanel">
  <div class="section-title">MUTUAL FUNDS</div>
  <div id="fundsList"></div>
</div>

<div class="panel" id="bondsPanel">
  <div class="section-title">TREASURY BONDS</div>
  <div id="bondsList"></div>
</div>

<div class="panel" id="cryptoPanel">
  <div class="section-title">CRYPTOCURRENCY</div>
  <div id="cryptoList"></div>
</div>

<div class="panel" id="limitOrdersPanel">
  <div class="section-title">LIMIT ORDERS</div>
  <div id="limitOrdersList"></div>
</div>

<div class="panel" id="portfolioPanel">
  <div class="section-title">YOUR PORTFOLIO</div>
  <div id="portfolioView"></div>
</div>

<div class="panel" id="upgradesPanel">
  <div class="section-title" style="color:#c084fc;">BROKERAGE UPGRADES</div>
  <div id="tierDisplay" style="text-align:center;padding:8px 0;"></div>
  <div id="achievementsList" style="margin-bottom:16px;"></div>
  <div id="upgradesList"></div>
</div>

<div style="padding:16px;">
  <button class="back-btn" id="backBtn" title="Close the brokerage and return to the main extension.">&larr; BACK</button>
</div>

<script src="lockout-guard.js"></script>
<script src="tooltip.js"></script>
<script src="brokerage-window.js"></script>
<script src="btn-sounds.js"></script>
<script src="tutorial-data.js"></script>
<script src="tutorial-ui.js"></script>
</body>
</html>
