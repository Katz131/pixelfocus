<!--
  =============================================================================
  BROKERAGE — Investment market for Todo of the Loom
  =============================================================================
  Full browser tab, NOT a Chrome extension popup. Opened via chrome.tabs.create.
  Reads/writes chrome.storage.local (pixelFocusState) like factory.js.

  Investment types:
    - STOCKS        — Loom-themed companies, realistic price movement
    - MUTUAL FUNDS  — Diversified, lower risk, steady growth
    - TREASURY BONDS— Guaranteed return, very safe, very slow
    - CRYPTO        — Extreme volatility, can moon or crash
    - GAMBLING      — Instant win/lose, pure luck

  Market simulation: prices update on page load + hourly tick.
  Unlockable tiers: start basic, unlock more as you trade.
  =============================================================================

<html lang="en">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a14;
  --surface: #12122a;
  --surface2: #1a1a3a;
  --accent: #00ff88;
  --accent2: #ff6b9d;
  --accent3: #4ecdc4;
  --gold: #ffd700;
  --gold-dim: #b8860b;
  --danger: #ff4466;
  --text: #e0e0e0;
  --text-dim: #5a5a7e;
  --border: #2a2a4a;
  --green: #00ff88;
  --red: #ff4466;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  padding: 0 0 60px;
}
.header {
  text-align: center;
  padding: 24px 16px 16px;
  border-bottom: 2px solid var(--border);
  background: linear-gradient(180deg, #0f0f2a 0%, var(--bg) 100%);
}
.header h1 {
  font-family: 'Press Start 2P', monospace;
  font-size: 18px;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(255,215,0,0.3);
  margin-bottom: 8px;
}
.header .subtitle {
  font-size: 11px;
  color: var(--text-dim);
}
.wallet-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
}
.wallet-bar .stat { display: flex; align-items: center; gap: 6px; }
.wallet-bar .label { color: var(--text-dim); }
.wallet-bar .val { color: var(--gold); }
.wallet-bar .val.green { color: var(--green); }
.wallet-bar .val.red { color: var(--red); }

/* Tab bar */
.tab-bar {
  display: flex;
  justify-content: center;
  gap: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0;
}
.tab-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  padding: 10px 16px;
  color: var(--text-dim);
  cursor: pointer;
  border: none;
  background: transparent;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-btn.locked { opacity: 0.3; cursor: not-allowed; }

/* Panels */
.panel { display: none; max-width: 900px; margin: 0 auto; padding: 20px 16px; }
.panel.active { display: block; }

/* Stock cards */
.stock-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
  transition: border-color 0.2s;
}
.stock-card:hover { border-color: var(--gold-dim); }
.stock-row { display: flex; align-items: center; gap: 12px; }
.stock-ticker {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  color: var(--accent3);
  min-width: 50px;
}
.stock-name { flex: 1; font-size: 13px; color: var(--text); }
.stock-price {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  min-width: 80px;
  text-align: right;
}
.stock-price.up { color: var(--green); }
.stock-price.down { color: var(--red); }
.stock-change {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  min-width: 70px;
  text-align: right;
}
.stock-change.up { color: var(--green); }
.stock-change.down { color: var(--red); }

/* Mini chart canvas */
.mini-chart { width: 100%; height: 60px; margin: 8px 0; }

/* Trade controls */
.trade-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.trade-input {
  width: 70px;
  padding: 4px 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  border-radius: 4px;
  text-align: center;
}
.trade-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  padding: 6px 12px;
  border: 1px solid;
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  transition: all 0.2s;
}
.trade-btn.buy { color: var(--green); border-color: var(--green); }
.trade-btn.buy:hover { background: rgba(0,255,136,0.15); }
.trade-btn.sell { color: var(--red); border-color: var(--red); }
.trade-btn.sell:hover { background: rgba(255,68,102,0.15); }
.trade-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.trade-info { font-size: 10px; color: var(--text-dim); margin-left: auto; }
.holding-badge {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--gold);
  background: rgba(255,215,0,0.1);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  padding: 3px 8px;
}

/* Bond cards */
.bond-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
}
.bond-card .rate {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--accent3);
}
.bond-card .maturity { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* Gambling */
.gamble-area {
  text-align: center;
  padding: 32px 16px;
}
.gamble-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  padding: 16px 32px;
  border: 2px solid var(--gold);
  color: var(--gold);
  background: transparent;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  margin: 8px;
}
.gamble-btn:hover { background: rgba(255,215,0,0.1); box-shadow: 0 0 20px rgba(255,215,0,0.2); }
.gamble-result {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  margin-top: 16px;
  min-height: 24px;
}

/* Portfolio */
.portfolio-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.portfolio-table th {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--text-dim);
  text-align: left;
  padding: 8px 6px;
  border-bottom: 1px solid var(--border);
}
.portfolio-table td {
  padding: 8px 6px;
  border-bottom: 1px solid rgba(42,42,74,0.5);
}
.portfolio-total {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  color: var(--gold);
  text-align: center;
  padding: 16px;
  margin-top: 16px;
  background: var(--surface);
  border: 1px solid var(--gold-dim);
  border-radius: 8px;
}

/* Market news ticker */
.news-ticker {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 6px 16px;
  font-size: 11px;
  color: var(--gold);
  text-align: center;
  overflow: hidden;
  white-space: nowrap;
}

/* Section headers */
.section-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* Back button */
.back-btn {
  position: fixed;
  bottom: 16px;
  left: 16px;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 8px 16px;
  background: var(--surface);
  color: var(--accent3);
  border: 1px solid var(--accent3);
  border-radius: 4px;
  cursor: pointer;
  z-index: 100;
}
.back-btn:hover { background: rgba(78,205,196,0.15); }

/* Acumen system (v3.23.79) */

.upgrade-card {

.upgrade-title { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--text); flex: 1; }
.upgrade-cost { font-family: 'Press Start 2P', monospace; font-size: 9px; color: #c084fc; }

.upgrade-desc { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 10px; }
.upgrade-effect {

.upgrade-buy-btn {

.ach-card {

.ach-card.earned { border-color: #7c3aed; background: rgba(192,132,252,0.05); }
.ach-name { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--text); margin-bottom: 4px; }
.ach-desc { font-size: 11px; color: var(--text-dim); }
.ach-reward { font-family: 'Press Start 2P', monospace; font-size: 9px; color: #c084fc; white-space: nowrap; }
.ach-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.ach-fill { height: 100%; background: #c084fc; border-radius: 2px; transition: width 0.5s; }
.sentiment-pill {
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  padding: 2px 6px; border-radius: 3px; margin-left: 8px;

.sent-bull { color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
.sent-bear { color: var(--red); border: 1px solid rgba(255,68,102,0.3); }
.sent-flat { color: var(--text-dim); border: 1px solid var(--border); }
.acumen-toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: rgba(192,132,252,0.95); color: #fff;
  font-family: 'Press Start 2P', monospace; font-size: 9px;
  padding: 10px 20px; border-radius: 6px; z-index: 9999;
  transition: opacity 0.5s; pointer-events: none;

/* Deposit/withdraw bar */
.deposit-bar {
  display: flex;
  justify-content: center;

  gap: 8px;
  padding: 8px;

.deposit-bar input {
  width: 100px;
  padding: 4px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--gold);
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  border-radius: 4px;
  text-align: center;
}
.deposit-bar button {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  transition: all 0.2s;
}
.deposit-btn { color: var(--green); border: 1px solid var(--green); }
.deposit-btn:hover { background: rgba(0,255,136,0.1); }
.withdraw-btn { color: var(--accent3); border: 1px solid var(--accent3); }
.withdraw-btn:hover { background: rgba(78,205,196,0.1); }
</style>
</head>

  // ===== Price engine =====
  // Geometric Brownian Motion: realistic stock price movement
  function gaussRandom() {
    var u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
  }

  function initPrices(b) {
    var allAssets = STOCKS.concat(CRYPTOS);
    allAssets.forEach(function(s) {
      if (!b.prices[s.id]) b.prices[s.id] = s.basePrice;
      if (!b.priceHistory[s.id]) b.priceHistory[s.id] = [s.basePrice];
    });
    // Fund prices derived from stock prices
    FUNDS.forEach(function(f) {
      if (!b.priceHistory[f.id]) b.priceHistory[f.id] = [];
    });
  }

  function tickMarket(b) {
    var now = Date.now();
    var TICK_INTERVAL = 60 * 60 * 1000; // 1 hour
    if (b.lastMarketTick && (now - b.lastMarketTick) < TICK_INTERVAL) return;

    // Calculate how many ticks we missed
    var ticksMissed = b.lastMarketTick ? Math.min(Math.floor((now - b.lastMarketTick) / TICK_INTERVAL), 168) : 1;
    if (ticksMissed < 1) ticksMissed = 1;

    var allAssets = STOCKS.concat(CRYPTOS);
    for (var t = 0; t < ticksMissed; t++) {
      // Random market event (5% chance per tick)
      var eventMult = 1;
      if (Math.random() < 0.05) {
        eventMult = 0.85 + Math.random() * 0.30; // -15% to +15% market-wide
      }

      allAssets.forEach(function(s) {
        var price = b.prices[s.id] || s.basePrice;
        var drift = s.drift || 0.001;
        var vol = s.volatility || 0.03;
        // GBM step
        var dW = gaussRandom();
        var dailyReturn = drift + vol * dW;
        price = price * (1 + dailyReturn) * eventMult;
        // Floor at 1% of base price (no going to zero)
        price = Math.max(price, s.basePrice * 0.01);
        // Cap at 100x base price
        price = Math.min(price, s.basePrice * 100);
        b.prices[s.id] = Math.round(price * 100) / 100;

        if (!b.priceHistory[s.id]) b.priceHistory[s.id] = [];
        b.priceHistory[s.id].push(b.prices[s.id]);
        // Keep last 168 ticks (1 week of hourly)
        if (b.priceHistory[s.id].length > 168) b.priceHistory[s.id] = b.priceHistory[s.id].slice(-168);
      });

      // Calculate fund prices (weighted average)
      FUNDS.forEach(function(f) {
        var fundPrice = calcFundPrice(f, b);
        if (!b.priceHistory[f.id]) b.priceHistory[f.id] = [];
        b.priceHistory[f.id].push(fundPrice);
        if (b.priceHistory[f.id].length > 168) b.priceHistory[f.id] = b.priceHistory[f.id].slice(-168);
      });
    }

    b.lastMarketTick = now;
  }

  function calcFundPrice(fund, b) {
    if (fund.id === 'TIF') {
      // Equal-weighted index of all stocks
      var total = 0;
      STOCKS.forEach(function(s) { total += (b.prices[s.id] || s.basePrice); });
      return Math.round((total / STOCKS.length) * 100) / 100;
    } else if (fund.id === 'GRF') {
      // Growth-weighted: 40% NVEX, 30% QBIT, 15% AAPL, 15% rest
      var nvex = b.prices['NVEX'] || 480;
      var qbit = b.prices['QBIT'] || 8;
      var aapl = b.prices['AAPL'] || 185;
      var rest = 0;
      STOCKS.forEach(function(s) { if (s.id !== 'NVEX' && s.id !== 'QBIT' && s.id !== 'AAPL') rest += (b.prices[s.id] || s.basePrice); });
      rest = rest / Math.max(1, STOCKS.length - 3);
      return Math.round((nvex * 0.4 + qbit * 0.3 + aapl * 0.15 + rest * 0.15) * 100) / 100;
    }
    return 10;
  }

  // ===== Formatting helpers =====
  function fmt(n) {
    if (typeof n !== 'number' || isNaN(n)) return '0';
    if (Math.abs(n) >= 1000000) return (n / 1000000).toFixed(2) + 'M';
    if (Math.abs(n) >= 10000) return (n / 1000).toFixed(1) + 'K';
    if (Math.abs(n) >= 100) return Math.round(n).toLocaleString();
    return n.toFixed(2);
  }

  function fmtPct(n) {
    if (typeof n !== 'number' || isNaN(n)) return '0.00%';
    return (n >= 0 ? '+' : '') + (n * 100).toFixed(2) + '%';
  }

  function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  // ===== Mini chart drawing =====
  function drawMiniChart(canvas, history, color) {
    if (!canvas || !history || history.length < 2) return;
    var ctx = canvas.getContext('2d');
    var w = canvas.width = canvas.offsetWidth * 2;
    var h = canvas.height = canvas.offsetHeight * 2;
    ctx.clearRect(0, 0, w, h);

    var min = Math.min.apply(null, history);
    var max = Math.max.apply(null, history);
    if (max === min) { max = min + 1; }
    var range = max - min;

    // Draw grid lines
    ctx.strokeStyle = 'rgba(42,42,74,0.5)';
    ctx.lineWidth = 1;
    for (var g = 0; g < 3; g++) {
      var gy = h * (g + 1) / 4;
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();
    }

    // Draw price line
    var isUp = history[history.length - 1] >= history[0];
    ctx.strokeStyle = color || (isUp ? '#00ff88' : '#ff4466');
    ctx.lineWidth = 2;
    ctx.beginPath();
    history.forEach(function(p, i) {
      var x = (i / (history.length - 1)) * w;
      var y = h - ((p - min) / range) * (h * 0.9) - h * 0.05;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Fill area under
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = isUp ? 'rgba(0,255,136,0.05)' : 'rgba(255,68,102,0.05)';
    ctx.fill();
  }

      '</tr></thead><tbody>';

    allAssets.forEach(function(a) {
      var holding = b.portfolio[a.id];
      if (!holding || !holding.shares) return;
      hasHoldings = true;
      var price = b.prices[a.id] || a.basePrice || calcFundPrice(a, b);
      var value = holding.shares * price;
      var cost = holding.shares * holding.avgCost;
      var pl = value - cost;
      var plPct = cost > 0 ? (pl / cost) : 0;
      table += '<tr>' +
        '<td style="color:var(--accent3);font-weight:bold;">' + a.id + ' <span style="color:var(--text-dim);font-weight:normal;">' + esc(a.name) + '</span></td>' +
        '<td>' + fmt(holding.shares) + '</td>' +
        '<td>$' + fmt(holding.avgCost) + '</td>' +
        '<td>$' + fmt(price) + '</td>' +
        '<td style="color:var(--gold);">$' + fmt(value) + '</td>' +
        '<td style="color:' + (pl >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + (pl >= 0 ? '+' : '') + fmt(pl) + ' (' + fmtPct(plPct) + ')</td>' +
        '</tr>';
    });

    table += '</tbody></table>';

    if (!hasHoldings && (!b.activeBonds || b.activeBonds.length === 0)) {
      el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);font-style:italic;">No investments yet. Start trading to build your portfolio.</div>';
      return;

    el.innerHTML = table;

      var bondSection = document.createElement('div');

      b.activeBonds.forEach(function(bond) {

        bondSection.innerHTML += '<div style="padding:4px 0;font-size:11px;color:var(--text);">' + esc(bond.name) + ' — $' + fmt(bond.amount) + ' (' + pct + '% mature)</div>';
      });
      el.appendChild(bondSection);
    }

    // Total summary
    var totalValue = b.cash + calcPortfolioValue(b);
    var totalInvested = b.totalDeposited - b.totalWithdrawn;
    var totalPL = totalValue - totalInvested;
    var summary = document.createElement('div');
    summary.className = 'portfolio-total';

      '<br><span style="font-size:9px;color:' + (totalPL >= 0 ? 'var(--green)' : 'var(--red)') + ';">All-time P/L: ' + (totalPL >= 0 ? '+' : '') + fmt(totalPL) + '</span>' +
      '<br><span style="font-size:8px;color:var(--text-dim);">Trades: ' + (b.tradesCount || 0) + '</span>';

  // ===== Trade actions =====
  function buyAsset(id, type) {
    var b = getB();
    var qtyEl = document.getElementById('qty_' + id);
    var qty = parseInt(qtyEl ? qtyEl.value : 1) || 1;
    if (qty < 1) return;

    var price;
    if (type === 'fund') {
      var fund = FUNDS.filter(function(f) { return f.id === id; })[0];
      if (!fund) return;
      price = calcFundPrice(fund, b);
      // Apply management fee
      price = price * (1 + fund.fee);
    } else {
      price = b.prices[id];
    }
    if (!price) return;

    var totalCost = qty * price;
    if (b.cash < totalCost) {
      SFX.lose();
      showNews('Not enough brokerage cash. Deposit more from your wallet.');
      return;
    }

    b.cash -= totalCost;
    b.cash = Math.round(b.cash * 100) / 100;

    if (!b.portfolio[id]) b.portfolio[id] = { shares: 0, avgCost: 0 };
    var h = b.portfolio[id];
    var oldTotal = h.shares * h.avgCost;
    h.shares += qty;
    h.avgCost = (oldTotal + totalCost) / h.shares;
    h.avgCost = Math.round(h.avgCost * 100) / 100;
    b.tradesCount++;

    // Acumen: detect dip buy (price dropped >10% from recent high)
    var hist = b.priceHistory[id] || [];
    if (hist.length >= 5) {
      var recentHigh = Math.max.apply(null, hist.slice(-10));
      if (price < recentHigh * 0.9) b.dipBuys = (b.dipBuys || 0) + 1;
    }

    SFX.buy();
    showNews('Bought ' + qty + ' ' + id + ' at $' + fmt(price) + '/ea.');
    checkAchievements(b);
    save(function() { renderAll(); });
  }

  function sellAsset(id, type) {
    var b = getB();
    var qtyEl = document.getElementById('qty_' + id);
    var qty = parseInt(qtyEl ? qtyEl.value : 1) || 1;

    var h = b.portfolio[id];
    if (!h || h.shares < qty) {
      SFX.lose();
      showNews('Not enough shares to sell.');
      return;
    }

    var price;
    if (type === 'fund') {
      var fund = FUNDS.filter(function(f) { return f.id === id; })[0];
      price = fund ? calcFundPrice(fund, b) : b.prices[id];
    } else {
      price = b.prices[id];
    }
    if (!price) return;

    var revenue = qty * price;
    var saleProfit = revenue - (qty * h.avgCost);
    if (saleProfit > (b.biggestSingleProfit || 0)) b.biggestSingleProfit = saleProfit;

    b.cash += revenue;
    b.cash = Math.round(b.cash * 100) / 100;
    h.shares -= qty;
    if (h.shares <= 0) delete b.portfolio[id];
    b.tradesCount++;

    SFX.sell();
    showNews('Sold ' + qty + ' ' + id + ' at $' + fmt(price) + '/ea for $' + fmt(revenue) + '.');
    checkAchievements(b);
    save(function() { renderAll(); });
  }

  function buyBond(bondId) {
    var b = getB();
    var bond = BONDS.filter(function(bd) { return bd.id === bondId; })[0];
    if (!bond) return;
    var amtEl = document.getElementById('bondAmt_' + bondId);
    var amount = parseInt(amtEl ? amtEl.value : 100) || 100;
    if (amount < 1) return;

    if (b.cash < amount) {
      SFX.lose();
      showNews('Not enough brokerage cash for this bond.');
      return;
    }

    b.cash -= amount;
    b.cash = Math.round(b.cash * 100) / 100;
    b.activeBonds.push({
      id: bondId,
      name: bond.name,
      amount: amount,
      rate: bond.rate,
      sessionsNeeded: bond.sessions,
      sessionsElapsed: 0,
      purchasedAt: Date.now()
    });
    b.tradesCount++;

    SFX.buy();
    showNews('Purchased ' + bond.name + ' for $' + fmt(amount) + '. Yield: ' + (bond.rate * 100) + '% on maturity.');
    save(function() { renderAll(); });
  }

  function collectBond(idx) {
    var b = getB();
    if (!b.activeBonds || idx >= b.activeBonds.length) return;
    var bond = b.activeBonds[idx];
    if ((bond.sessionsElapsed || 0) < bond.sessionsNeeded) return;

    var payout = bond.amount * (1 + bond.rate);
    b.cash += Math.round(payout * 100) / 100;
    b.activeBonds.splice(idx, 1);

    SFX.cha_ching();
    showNews('Bond matured! Collected $' + fmt(payout) + ' (principal + ' + (bond.rate * 100) + '% yield).');
    save(function() { renderAll(); });
  }

  function playGamble(gameId) {
    var b = getB();
    var game = GAMBLING_GAMES.filter(function(g) { return g.id === gameId; })[0];
    if (!game) return;
    var wagerEl = document.getElementById('wager_' + gameId);
    var wager = parseInt(wagerEl ? wagerEl.value : 10) || 10;
    if (wager < 1) return;

    if (b.cash < wager) {
      SFX.lose();
      showNews('Not enough brokerage cash to gamble.');
      return;
    }

    b.cash -= wager;
    b.totalGambled = (b.totalGambled || 0) + wager;
    b.tradesCount++;

    var resultEl = document.getElementById('result_' + gameId);
    var won = Math.random() < game.odds;

    if (won) {
      var winnings = wager * game.payout;
      b.cash += winnings;
      b.totalGamblingWon = (b.totalGamblingWon || 0) + winnings;
      SFX.win();
      if (resultEl) {
        resultEl.style.color = 'var(--green)';
        resultEl.textContent = 'WIN! +$' + fmt(winnings);
      }
      showNews('Jackpot! Won $' + fmt(winnings) + ' on ' + game.name + '!');
    } else {
      SFX.lose();
      if (resultEl) {
        resultEl.style.color = 'var(--red)';
        resultEl.textContent = 'LOST $' + fmt(wager);
      }
      showNews('Lost $' + fmt(wager) + ' on ' + game.name + '. The house always wins.');
    }

    b.cash = Math.round(b.cash * 100) / 100;
    save(function() { renderWalletBar(); renderGambling(); });
  }

  // Add sentiment badges to renderStocks when upgrade is owned
  var _origRenderStocks = renderStocks;
  renderStocks = function() {
    _origRenderStocks();
    var b = getB();
    if (b.ownedUpgrades && b.ownedUpgrades.sentiment) {
      document.querySelectorAll('.stock-card').forEach(function(card) {
        var tickerEl = card.querySelector('.stock-ticker');
        if (!tickerEl) return;
        var id = tickerEl.textContent.trim();
        var hist = b.priceHistory[id] || [];
        if (hist.length < 3) return;
        var recent = hist.slice(-5);
        var avg = recent.reduce(function(a,b){return a+b;},0) / recent.length;
        var last = recent[recent.length - 1];
        var sentClass = 'sent-flat', sentText = 'FLAT';
        if (last > avg * 1.02) { sentClass = 'sent-bull'; sentText = 'BULL'; }
        else if (last < avg * 0.98) { sentClass = 'sent-bear'; sentText = 'BEAR'; }
        var pill = document.createElement('span');
        pill.className = 'sentiment-pill ' + sentClass;
        pill.textContent = sentText;
        tickerEl.parentNode.insertBefore(pill, tickerEl.nextSibling);
      });
    }
  };

  // Enhance drawMiniChart for trend lines when upgrade is owned
  var _origDrawMiniChart = drawMiniChart;
  drawMiniChart = function(canvas, history, color) {
    _origDrawMiniChart(canvas, history, color);
    var b = getB();
    if (b.ownedUpgrades && b.ownedUpgrades.trendLines && canvas && history && history.length >= 5) {
      var ctx = canvas.getContext('2d');
      var w = canvas.width;
      var h = canvas.height;
      var min = Math.min.apply(null, history);
      var max = Math.max.apply(null, history);
      if (max === min) max = min + 1;
      var range = max - min;
      // Simple moving average (5-period)
      var sma = [];
      for (var i = 0; i < history.length; i++) {
        if (i < 4) { sma.push(null); continue; }
        var sum = 0;
        for (var j = i - 4; j <= i; j++) sum += history[j];
        sma.push(sum / 5);
      }
      ctx.strokeStyle = 'rgba(192,132,252,0.7)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      var started = false;
      sma.forEach(function(v, i) {
        if (v === null) return;
        var x = (i / (history.length - 1)) * w;
        var y = h - ((v - min) / range) * (h * 0.9) - h * 0.05;
        if (!started) { ctx.moveTo(x, y); started = true; } else { ctx.lineTo(x, y); }
      });
      ctx.stroke();
      ctx.setLineDash([]);
    }
  };

    renderFunds();
    renderBonds();
    renderCrypto();
    renderGambling();
    renderPortfolio();
    renderUpgrades();
  }

  // ===== Init =====
  load(function() {
    renderAll();

    // Rotate news every 15 seconds
    setInterval(randomNews, 15000);

    // Tick market every hour while page is open
    setInterval(function() {
      var b = getB();
      tickMarket(b);
      save(function() { renderAll(); });
    }, 60 * 60 * 1000);
  });

  // Wire deposit/withdraw
  document.getElementById('depositBtn').addEventListener('click', deposit);
  document.getElementById('withdrawBtn').addEventListener('click', withdraw);

  // Back button
  document.getElementById('backBtn').addEventListener('click', function() {
    window.close();
  });

})();
</script>
</body>
</html>
