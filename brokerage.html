<!DOCTYPE html>
<!--
  =============================================================================
  BROKERAGE — Investment market for Todo of the Loom
  =============================================================================
  Full browser tab, NOT a Chrome extension popup. Opened via chrome.tabs.create.
  Reads/writes chrome.storage.local (pixelFocusState) like factory.js.

  Investment types:
    - STOCKS        — Loom-themed companies, realistic price movement
    - MUTUAL FUNDS  — Diversified, lower risk, steady growth
    - TREASURY BONDS— Guaranteed return, very safe, very slow
    - CRYPTO        — Extreme volatility, can moon or crash
    - GAMBLING      — Instant win/lose, pure luck

  Market simulation: prices update on page load + hourly tick.
  Unlockable tiers: start basic, unlock more as you trade.
  =============================================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo of the Loom — Brokerage</title>
<link rel="stylesheet" href="fonts.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a14;
  --surface: #12122a;
  --surface2: #1a1a3a;
  --accent: #00ff88;
  --accent2: #ff6b9d;
  --accent3: #4ecdc4;
  --gold: #ffd700;
  --gold-dim: #b8860b;
  --danger: #ff4466;
  --text: #e0e0e0;
  --text-dim: #5a5a7e;
  --border: #2a2a4a;
  --green: #00ff88;
  --red: #ff4466;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  padding: 0 0 60px;
}
.header {
  text-align: center;
  padding: 24px 16px 16px;
  border-bottom: 2px solid var(--border);
  background: linear-gradient(180deg, #0f0f2a 0%, var(--bg) 100%);
}
.header h1 {
  font-family: 'Press Start 2P', monospace;
  font-size: 18px;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(255,215,0,0.3);
  margin-bottom: 8px;
}
.header .subtitle {
  font-size: 11px;
  color: var(--text-dim);
}
.wallet-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
}
.wallet-bar .stat { display: flex; align-items: center; gap: 6px; }
.wallet-bar .label { color: var(--text-dim); }
.wallet-bar .val { color: var(--gold); }
.wallet-bar .val.green { color: var(--green); }
.wallet-bar .val.red { color: var(--red); }

/* Tab bar */
.tab-bar {
  display: flex;
  justify-content: center;
  gap: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0;
}
.tab-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  padding: 10px 16px;
  color: var(--text-dim);
  cursor: pointer;
  border: none;
  background: transparent;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-btn.locked { opacity: 0.3; cursor: not-allowed; }

/* Panels */
.panel { display: none; max-width: 900px; margin: 0 auto; padding: 20px 16px; }
.panel.active { display: block; }

/* Stock cards */
.stock-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
  transition: border-color 0.2s;
}
.stock-card:hover { border-color: var(--gold-dim); }
.stock-row { display: flex; align-items: center; gap: 12px; }
.stock-ticker {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  color: var(--accent3);
  min-width: 50px;
}
.stock-name { flex: 1; font-size: 13px; color: var(--text); }
.stock-price {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  min-width: 80px;
  text-align: right;
}
.stock-price.up { color: var(--green); }
.stock-price.down { color: var(--red); }
.stock-change {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  min-width: 70px;
  text-align: right;
}
.stock-change.up { color: var(--green); }
.stock-change.down { color: var(--red); }

/* Mini chart canvas */
.mini-chart { width: 100%; height: 60px; margin: 8px 0; }

/* Trade controls */
.trade-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.trade-input {
  width: 70px;
  padding: 4px 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  border-radius: 4px;
  text-align: center;
}
.trade-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  padding: 6px 12px;
  border: 1px solid;
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  transition: all 0.2s;
}
.trade-btn.buy { color: var(--green); border-color: var(--green); }
.trade-btn.buy:hover { background: rgba(0,255,136,0.15); }
.trade-btn.sell { color: var(--red); border-color: var(--red); }
.trade-btn.sell:hover { background: rgba(255,68,102,0.15); }
.trade-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.trade-info { font-size: 10px; color: var(--text-dim); margin-left: auto; }
.holding-badge {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--gold);
  background: rgba(255,215,0,0.1);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  padding: 3px 8px;
}

/* Bond cards */
.bond-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
}
.bond-card .rate {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--accent3);
}
.bond-card .maturity { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* Gambling */
.gamble-area {
  text-align: center;
  padding: 32px 16px;
}
.gamble-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  padding: 16px 32px;
  border: 2px solid var(--gold);
  color: var(--gold);
  background: transparent;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  margin: 8px;
}
.gamble-btn:hover { background: rgba(255,215,0,0.1); box-shadow: 0 0 20px rgba(255,215,0,0.2); }
.gamble-result {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  margin-top: 16px;
  min-height: 24px;
}

/* Portfolio */
.portfolio-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.portfolio-table th {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--text-dim);
  text-align: left;
  padding: 8px 6px;
  border-bottom: 1px solid var(--border);
}
.portfolio-table td {
  padding: 8px 6px;
  border-bottom: 1px solid rgba(42,42,74,0.5);
}
.portfolio-total {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  color: var(--gold);
  text-align: center;
  padding: 16px;
  margin-top: 16px;
  background: var(--surface);
  border: 1px solid var(--gold-dim);
  border-radius: 8px;
}

/* Market news ticker */
.news-ticker {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 6px 16px;
  font-size: 11px;
  color: var(--gold);
  text-align: center;
  overflow: hidden;
  white-space: nowrap;
}

/* Section headers */
.section-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* Back button */
.back-btn {
  position: fixed;
  bottom: 16px;
  left: 16px;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 8px 16px;
  background: var(--surface);
  color: var(--accent3);
  border: 1px solid var(--accent3);
  border-radius: 4px;
  cursor: pointer;
  z-index: 100;
}
.back-btn:hover { background: rgba(78,205,196,0.15); }

/* Deposit/withdraw bar */
.deposit-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  padding: 8px;
  background: rgba(255,215,0,0.03);
  border-bottom: 1px solid var(--border);
}
.deposit-bar input {
  width: 100px;
  padding: 4px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--gold);
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  border-radius: 4px;
  text-align: center;
}
.deposit-bar button {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  transition: all 0.2s;
}
.deposit-btn { color: var(--green); border: 1px solid var(--green); }
.deposit-btn:hover { background: rgba(0,255,136,0.1); }
.withdraw-btn { color: var(--accent3); border: 1px solid var(--accent3); }
.withdraw-btn:hover { background: rgba(78,205,196,0.1); }
</style>

<script>
(function() {
  'use strict';

  // ===== Sound engine =====
  var SFX = (function() {
    var ctx = null;
    function getCtx() {
      if (!ctx || ctx.state === 'closed') ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    }
    function tone(freq, dur, type, vol) {
      try {
        var c = getCtx(), o = c.createOscillator(), g = c.createGain();
        o.type = type || 'square'; o.frequency.setValueAtTime(freq, c.currentTime);
        g.gain.setValueAtTime(vol || 0.08, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
        o.connect(g); g.connect(c.destination); o.start(c.currentTime); o.stop(c.currentTime + dur);
      } catch(e) {}
    }
    return {
      click: function() { tone(600, 0.05, 'square', 0.06); },
      buy: function() { [523,659,784,1047].forEach(function(f,i) { setTimeout(function() { tone(f,0.08,'square',0.08); }, i*60); }); },
      sell: function() { [1047,784,659,523].forEach(function(f,i) { setTimeout(function() { tone(f,0.08,'square',0.08); }, i*60); }); },
      win: function() { [523,659,784,1047,1318].forEach(function(f,i) { setTimeout(function() { tone(f,0.1,'square',0.1); }, i*80); }); },
      lose: function() { [400,300,200].forEach(function(f,i) { setTimeout(function() { tone(f,0.12,'square',0.1); }, i*100); }); },
      cha_ching: function() { [800,1200,1600,2000].forEach(function(f,i) { setTimeout(function() { tone(f,0.08,'sine',0.08); }, i*50); }); }
    };
  })();

  // ===== Market definitions =====
  var STOCKS = [
    { id: 'LMC', name: 'LoomCorp', desc: 'Blue-chip textile conglomerate. Reliable, boring, profitable.', basePrice: 100, volatility: 0.02, drift: 0.001 },
    { id: 'TTK', name: 'ThreadTech', desc: 'High-growth tech startup automating thread production.', basePrice: 45, volatility: 0.04, drift: 0.002 },
    { id: 'WVI', name: 'Weave Industries', desc: 'Cyclical manufacturer. Booms when orders come in, busts when they don\'t.', basePrice: 72, volatility: 0.035, drift: 0.0005 },
    { id: 'SRL', name: 'Silk Road Logistics', desc: 'Global shipping and freight. Moves the textiles nobody else can.', basePrice: 28, volatility: 0.03, drift: 0.0015 },
    { id: 'DCC', name: 'Dye Chemical Co', desc: 'Raw materials supplier. Cheap stock, steady demand.', basePrice: 15, volatility: 0.025, drift: 0.001 },
    { id: 'NFL', name: 'NanoFiber Labs', desc: 'Speculative biotech. Either the future of fabric or vaporware.', basePrice: 8, volatility: 0.07, drift: 0.003 }
  ];

  var FUNDS = [
    { id: 'TIF', name: 'Textile Index Fund', desc: 'Weighted basket of all listed stocks. Diversified and steady.', fee: 0.005 },
    { id: 'GRF', name: 'Growth Fund', desc: 'Weighted toward TTK and NFL. Higher risk, higher potential.', fee: 0.008 }
  ];

  var BONDS = [
    { id: 'TB3', name: '3-Session Bond', desc: 'Matures after 3 focus sessions. Low yield, guaranteed.', sessions: 3, rate: 0.02 },
    { id: 'TB7', name: '7-Session Bond', desc: 'Matures after 7 focus sessions. Moderate yield, guaranteed.', sessions: 7, rate: 0.05 },
    { id: 'TB20', name: '20-Session Bond', desc: 'Matures after 20 focus sessions. High yield, long commitment.', sessions: 20, rate: 0.15 }
  ];

  var CRYPTOS = [
    { id: 'THC', name: 'ThreadCoin', desc: 'The people\'s crypto. Wildly volatile. Community-driven.', basePrice: 0.50, volatility: 0.12, drift: 0.005 },
    { id: 'LTK', name: 'LoomToken', desc: 'Utility token for decentralized weaving. Slightly less insane.', basePrice: 3.20, volatility: 0.08, drift: 0.003 }
  ];

  var GAMBLING_GAMES = [
    { id: 'coinflip', name: 'Coin Flip', desc: 'Double or nothing. 50/50.', odds: 0.5, payout: 2 },
    { id: 'slots', name: 'The Loom Slots', desc: 'Spin to win. Mostly spin to lose.', odds: 0.15, payout: 5 },
    { id: 'highroller', name: 'High Roller', desc: 'Big risk, big reward. 10% chance at 8x.', odds: 0.10, payout: 8 }
  ];

  var NEWS = [
    'LoomCorp reports record quarterly earnings.',
    'ThreadTech announces revolutionary self-healing fabric.',
    'Weave Industries hit by supply chain delays.',
    'Silk Road Logistics expands into new markets.',
    'Dye Chemical Co faces environmental review.',
    'NanoFiber Labs publishes promising trial results.',
    'ThreadCoin surges on social media hype.',
    'LoomToken partnerships expand utility.',
    'Markets steady as weaving sector consolidates.',
    'Analysts warn of textile bubble forming.',
    'Central Loom Bank holds interest rates steady.',
    'Crypto markets in turmoil after exchange hack.',
    'Mutual fund inflows hit record highs.',
    'Bond yields remain attractive for cautious investors.',
    'Retail investors pile into speculative fiber stocks.',
    'Market regulators announce new trading rules.',
    'NanoFiber plunges on failed clinical trial.',
    'LoomCorp dividend announced: 2% yield.',
    'ThreadTech CEO steps down. Stock wobbles.',
    'Weave Industries wins massive government contract.'
  ];

  // ===== State =====
  var state = {};

  function getB() {
    if (!state.brokerage) state.brokerage = {};
    var b = state.brokerage;
    if (typeof b.cash !== 'number') b.cash = 0;
    if (!b.portfolio) b.portfolio = {};
    if (!b.prices) b.prices = {};
    if (!b.priceHistory) b.priceHistory = {};
    if (!b.activeBonds) b.activeBonds = [];
    if (typeof b.totalDeposited !== 'number') b.totalDeposited = 0;
    if (typeof b.totalWithdrawn !== 'number') b.totalWithdrawn = 0;
    if (typeof b.tradesCount !== 'number') b.tradesCount = 0;
    if (typeof b.totalGambled !== 'number') b.totalGambled = 0;
    if (typeof b.totalGamblingWon !== 'number') b.totalGamblingWon = 0;
    if (typeof b.lastMarketTick !== 'number') b.lastMarketTick = 0;
    if (typeof b.sessionsSinceBonds !== 'number') b.sessionsSinceBonds = 0;
    return b;
  }

  // ===== Storage =====
  function load(cb) {
    chrome.storage.local.get('pixelFocusState', function(r) {
      state = r.pixelFocusState || {};
      if (typeof state.coins !== 'number') state.coins = 0;
      var b = getB();
      // Initialize prices if needed
      initPrices(b);
      // Tick market forward if enough time has passed
      tickMarket(b);
      save(cb);
    });
  }

  function save(cb) {
    chrome.storage.local.set({ pixelFocusState: state }, cb || function() {});
  }

  // ===== Price engine =====
  // Geometric Brownian Motion: realistic stock price movement
  function gaussRandom() {
    var u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
  }

  function initPrices(b) {
    var allAssets = STOCKS.concat(CRYPTOS);
    allAssets.forEach(function(s) {
      if (!b.prices[s.id]) b.prices[s.id] = s.basePrice;
      if (!b.priceHistory[s.id]) b.priceHistory[s.id] = [s.basePrice];
    });
    // Fund prices derived from stock prices
    FUNDS.forEach(function(f) {
      if (!b.priceHistory[f.id]) b.priceHistory[f.id] = [];
    });
  }

  function tickMarket(b) {
    var now = Date.now();
    var TICK_INTERVAL = 60 * 60 * 1000; // 1 hour
    if (b.lastMarketTick && (now - b.lastMarketTick) < TICK_INTERVAL) return;

    // Calculate how many ticks we missed
    var ticksMissed = b.lastMarketTick ? Math.min(Math.floor((now - b.lastMarketTick) / TICK_INTERVAL), 168) : 1;
    if (ticksMissed < 1) ticksMissed = 1;

    var allAssets = STOCKS.concat(CRYPTOS);
    for (var t = 0; t < ticksMissed; t++) {
      // Random market event (5% chance per tick)
      var eventMult = 1;
      if (Math.random() < 0.05) {
        eventMult = 0.85 + Math.random() * 0.30; // -15% to +15% market-wide
      }

      allAssets.forEach(function(s) {
        var price = b.prices[s.id] || s.basePrice;
        var drift = s.drift || 0.001;
        var vol = s.volatility || 0.03;
        // GBM step
        var dW = gaussRandom();
        var dailyReturn = drift + vol * dW;
        price = price * (1 + dailyReturn) * eventMult;
        // Floor at 1% of base price (no going to zero)
        price = Math.max(price, s.basePrice * 0.01);
        // Cap at 100x base price
        price = Math.min(price, s.basePrice * 100);
        b.prices[s.id] = Math.round(price * 100) / 100;

        if (!b.priceHistory[s.id]) b.priceHistory[s.id] = [];
        b.priceHistory[s.id].push(b.prices[s.id]);
        // Keep last 168 ticks (1 week of hourly)
        if (b.priceHistory[s.id].length > 168) b.priceHistory[s.id] = b.priceHistory[s.id].slice(-168);
      });

      // Calculate fund prices (weighted average)
      FUNDS.forEach(function(f) {
        var fundPrice = calcFundPrice(f, b);
        if (!b.priceHistory[f.id]) b.priceHistory[f.id] = [];
        b.priceHistory[f.id].push(fundPrice);
        if (b.priceHistory[f.id].length > 168) b.priceHistory[f.id] = b.priceHistory[f.id].slice(-168);
      });
    }

    b.lastMarketTick = now;
  }

  function calcFundPrice(fund, b) {
    if (fund.id === 'TIF') {
      // Equal-weighted index of all stocks
      var total = 0;
      STOCKS.forEach(function(s) { total += (b.prices[s.id] || s.basePrice); });
      return Math.round((total / STOCKS.length) * 100) / 100;
    } else if (fund.id === 'GRF') {
      // Growth-weighted: 40% TTK, 30% NFL, 15% LMC, 15% rest
      var ttk = b.prices['TTK'] || 45;
      var nfl = b.prices['NFL'] || 8;
      var lmc = b.prices['LMC'] || 100;
      var rest = 0;
      STOCKS.forEach(function(s) { if (s.id !== 'TTK' && s.id !== 'NFL' && s.id !== 'LMC') rest += (b.prices[s.id] || s.basePrice); });
      rest = rest / Math.max(1, STOCKS.length - 3);
      return Math.round((ttk * 0.4 + nfl * 0.3 + lmc * 0.15 + rest * 0.15) * 100) / 100;
    }
    return 10;
  }

  // ===== Formatting helpers =====
  function fmt(n) {
    if (typeof n !== 'number' || isNaN(n)) return '0';
    if (Math.abs(n) >= 1000000) return (n / 1000000).toFixed(2) + 'M';
    if (Math.abs(n) >= 10000) return (n / 1000).toFixed(1) + 'K';
    if (Math.abs(n) >= 100) return Math.round(n).toLocaleString();
    return n.toFixed(2);
  }

  function fmtPct(n) {
    if (typeof n !== 'number' || isNaN(n)) return '0.00%';
    return (n >= 0 ? '+' : '') + (n * 100).toFixed(2) + '%';
  }

  // ===== Mini chart drawing =====
  function drawMiniChart(canvas, history, color) {
    if (!canvas || !history || history.length < 2) return;
    var ctx = canvas.getContext('2d');
    var w = canvas.width = canvas.offsetWidth * 2;
    var h = canvas.height = canvas.offsetHeight * 2;
    ctx.clearRect(0, 0, w, h);

    var min = Math.min.apply(null, history);
    var max = Math.max.apply(null, history);
    if (max === min) { max = min + 1; }
    var range = max - min;

    // Draw grid lines
    ctx.strokeStyle = 'rgba(42,42,74,0.5)';
    ctx.lineWidth = 1;
    for (var g = 0; g < 3; g++) {
      var gy = h * (g + 1) / 4;
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();
    }

    // Draw price line
    var isUp = history[history.length - 1] >= history[0];
    ctx.strokeStyle = color || (isUp ? '#00ff88' : '#ff4466');
    ctx.lineWidth = 2;
    ctx.beginPath();
    history.forEach(function(p, i) {
      var x = (i / (history.length - 1)) * w;
      var y = h - ((p - min) / range) * (h * 0.9) - h * 0.05;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Fill area under
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = isUp ? 'rgba(0,255,136,0.05)' : 'rgba(255,68,102,0.05)';
    ctx.fill();
  }

    var total = 0;
    Object.keys(b.portfolio).forEach(function(id) {

      var price = b.prices[id] || 0;

    return Math.round(total * 100) / 100;
  }

  // ===== Trade actions =====
  function buyAsset(id, type) {
    var b = getB();
    var qtyEl = document.getElementById('qty_' + id);
    var qty = parseInt(qtyEl ? qtyEl.value : 1) || 1;
    if (qty < 1) return;

    var price;
    if (type === 'fund') {
      var fund = FUNDS.filter(function(f) { return f.id === id; })[0];
      if (!fund) return;
      price = calcFundPrice(fund, b);
      // Apply management fee
      price = price * (1 + fund.fee);
    } else {
      price = b.prices[id];
    }
    if (!price) return;

    var totalCost = qty * price;
    if (b.cash < totalCost) {
      SFX.lose();
      showNews('Not enough brokerage cash. Deposit more from your wallet.');
      return;
    }

    b.cash -= totalCost;
    b.cash = Math.round(b.cash * 100) / 100;

    if (!b.portfolio[id]) b.portfolio[id] = { shares: 0, avgCost: 0 };
    var h = b.portfolio[id];
    var oldTotal = h.shares * h.avgCost;
    h.shares += qty;
    h.avgCost = (oldTotal + totalCost) / h.shares;
    h.avgCost = Math.round(h.avgCost * 100) / 100;
    b.tradesCount++;

    SFX.buy();
    showNews('Bought ' + qty + ' ' + id + ' at $' + fmt(price) + '/ea.');
    save(function() { renderAll(); });
  }

  function sellAsset(id, type) {
    var b = getB();
    var qtyEl = document.getElementById('qty_' + id);
    var qty = parseInt(qtyEl ? qtyEl.value : 1) || 1;

    var h = b.portfolio[id];
    if (!h || h.shares < qty) {
      SFX.lose();
      showNews('Not enough shares to sell.');
      return;
    }

    var price;
    if (type === 'fund') {
      var fund = FUNDS.filter(function(f) { return f.id === id; })[0];
      price = fund ? calcFundPrice(fund, b) : b.prices[id];
    } else {
      price = b.prices[id];
    }
    if (!price) return;

    var revenue = qty * price;
    b.cash += revenue;
    b.cash = Math.round(b.cash * 100) / 100;
    h.shares -= qty;
    if (h.shares <= 0) delete b.portfolio[id];
    b.tradesCount++;

    SFX.sell();
    showNews('Sold ' + qty + ' ' + id + ' at $' + fmt(price) + '/ea for $' + fmt(revenue) + '.');
    save(function() { renderAll(); });
  }

  function buyBond(bondId) {
    var b = getB();
    var bond = BONDS.filter(function(bd) { return bd.id === bondId; })[0];
    if (!bond) return;
    var amtEl = document.getElementById('bondAmt_' + bondId);
    var amount = parseInt(amtEl ? amtEl.value : 100) || 100;
    if (amount < 1) return;

    if (b.cash < amount) {
      SFX.lose();
      showNews('Not enough brokerage cash for this bond.');
      return;
    }

    b.cash -= amount;
    b.cash = Math.round(b.cash * 100) / 100;
    b.activeBonds.push({
      id: bondId,
      name: bond.name,
      amount: amount,
      rate: bond.rate,
      sessionsNeeded: bond.sessions,
      sessionsElapsed: 0,
      purchasedAt: Date.now()
    });
    b.tradesCount++;

    SFX.buy();
    showNews('Purchased ' + bond.name + ' for $' + fmt(amount) + '. Yield: ' + (bond.rate * 100) + '% on maturity.');
    save(function() { renderAll(); });
  }

  function collectBond(idx) {
    var b = getB();
    if (!b.activeBonds || idx >= b.activeBonds.length) return;
    var bond = b.activeBonds[idx];
    if ((bond.sessionsElapsed || 0) < bond.sessionsNeeded) return;

    var payout = bond.amount * (1 + bond.rate);
    b.cash += Math.round(payout * 100) / 100;
    b.activeBonds.splice(idx, 1);

    SFX.cha_ching();
    showNews('Bond matured! Collected $' + fmt(payout) + ' (principal + ' + (bond.rate * 100) + '% yield).');
    save(function() { renderAll(); });
  }

  function playGamble(gameId) {
    var b = getB();
    var game = GAMBLING_GAMES.filter(function(g) { return g.id === gameId; })[0];
    if (!game) return;
    var wagerEl = document.getElementById('wager_' + gameId);
    var wager = parseInt(wagerEl ? wagerEl.value : 10) || 10;
    if (wager < 1) return;

    if (b.cash < wager) {
      SFX.lose();
      showNews('Not enough brokerage cash to gamble.');
      return;
    }

    b.cash -= wager;
    b.totalGambled = (b.totalGambled || 0) + wager;
    b.tradesCount++;

    var resultEl = document.getElementById('result_' + gameId);
    var won = Math.random() < game.odds;

    if (won) {
      var winnings = wager * game.payout;
      b.cash += winnings;
      b.totalGamblingWon = (b.totalGamblingWon || 0) + winnings;
      SFX.win();
      if (resultEl) {
        resultEl.style.color = 'var(--green)';
        resultEl.textContent = 'WIN! +$' + fmt(winnings);
      }
      showNews('Jackpot! Won $' + fmt(winnings) + ' on ' + game.name + '!');
    } else {
      SFX.lose();
      if (resultEl) {
        resultEl.style.color = 'var(--red)';
        resultEl.textContent = 'LOST $' + fmt(wager);
      }
      showNews('Lost $' + fmt(wager) + ' on ' + game.name + '. The house always wins.');
    }

    b.cash = Math.round(b.cash * 100) / 100;
    save(function() { renderWalletBar(); renderGambling(); });
  }

  // ===== Deposit / Withdraw =====
  function deposit() {
    var b = getB();
    var amt = parseInt(document.getElementById('transferAmt').value) || 0;
    if (amt < 1 || state.coins < amt) {
      SFX.lose();
      showNews(state.coins < amt ? 'Not enough coins in wallet.' : 'Enter a valid amount.');
      return;
    }
    state.coins -= amt;
    b.cash += amt;
    b.totalDeposited += amt;
    SFX.buy();
    showNews('Deposited $' + fmt(amt) + ' into brokerage.');
    save(function() { renderWalletBar(); });
  }

  function withdraw() {
    var b = getB();
    var amt = parseInt(document.getElementById('transferAmt').value) || 0;
    if (amt < 1 || b.cash < amt) {
      SFX.lose();
      showNews(b.cash < amt ? 'Not enough brokerage cash.' : 'Enter a valid amount.');
      return;
    }
    b.cash -= amt;
    state.coins += amt;
    b.totalWithdrawn += amt;
    SFX.sell();
    showNews('Withdrew $' + fmt(amt) + ' to wallet.');
    save(function() { renderWalletBar(); });
  }

  // ===== News ticker =====
  var _newsQueue = [];
  function showNews(msg) {
    var ticker = document.getElementById('newsTicker');
    if (ticker) {
      ticker.textContent = msg;
      ticker.style.color = 'var(--gold)';
    }
  }

  function randomNews() {
    var msg = NEWS[Math.floor(Math.random() * NEWS.length)];
    showNews(msg);
  }

  // ===== Render all =====
  function renderAll() {
    renderWalletBar();
    renderStocks();
    renderFunds();
    renderBonds();
    renderCrypto();
    renderGambling();
    renderPortfolio();
  }

  // ===== Init =====
  load(function() {
    renderAll();

    // Rotate news every 15 seconds
    setInterval(randomNews, 15000);

    // Tick market every hour while page is open
    setInterval(function() {
      var b = getB();
      tickMarket(b);
      save(function() { renderAll(); });
    }, 60 * 60 * 1000);
  });

  // Wire deposit/withdraw
  document.getElementById('depositBtn').addEventListener('click', deposit);
  document.getElementById('withdrawBtn').addEventListener('click', withdraw);

  // Back button
  document.getElementById('backBtn').addEventListener('click', function() {
    window.close();
  });

})();
</script>
</body>
</html>
