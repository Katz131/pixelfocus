<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Morning Check-in — Todo of the Loom</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --bg:#08080f; --surface:#12122a; --surface2:#1a1a3a; --accent:#ffb64c; --accent2:#ffd700;
           --text:#e0e0e0; --text-dim:#5a5a7e; --border:#2a2a4a; --success:#00ff88; --danger:#ff6b6b; }
  body { background:radial-gradient(ellipse at 50% 30%, #1e1a12 0%, var(--bg) 60%);
         color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh;
         display:flex; align-items:center; justify-content:center; padding:20px; }

  .card { background:var(--surface); border:2px solid var(--accent); border-radius:16px;
          max-width:380px; width:100%; box-shadow:0 0 40px rgba(255,182,76,0.15); overflow:hidden; }

  .header { padding:24px 24px 16px; text-align:center; border-bottom:1px solid rgba(255,182,76,0.2); }
  .sun { font-size:40px; animation:rise 2s ease-out forwards; }
  @keyframes rise { 0%{transform:translateY(10px);opacity:0.5} 100%{transform:translateY(0);opacity:1} }
  .title { font-family:'Press Start 2P',monospace; font-size:11px; color:var(--accent); letter-spacing:1px; margin-top:10px; }
  .question { font-size:14px; color:var(--text); margin-top:14px; line-height:1.6; }
  .question strong { color:var(--accent2); font-family:'Press Start 2P',monospace; font-size:12px; }

  .streak-bar { padding:12px 24px; text-align:center; }
  .streak-text { font-family:'Press Start 2P',monospace; font-size:9px; color:var(--accent2); letter-spacing:0.5px; }
  .streak-dots { display:flex; justify-content:center; gap:6px; margin-top:8px; }
  .streak-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--accent);
                background:transparent; transition:all 0.3s ease; }
  .streak-dot.filled { background:var(--accent2); border-color:var(--accent2);
                       box-shadow:0 0 8px rgba(255,215,0,0.5); }
  .streak-dot.current { animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 4px rgba(255,182,76,0.3)} 50%{box-shadow:0 0 14px rgba(255,182,76,0.7)} }

  .actions { padding:16px 24px 20px; display:flex; gap:10px; }
  .btn { flex:1; padding:14px 10px; border-radius:8px; font-family:'Press Start 2P',monospace;
         font-size:10px; cursor:pointer; border:2px solid; transition:all 0.15s ease; letter-spacing:0.5px; }
  .btn:hover { transform:scale(1.03); }
  .btn:active { transform:scale(0.97); }
  .btn-yes { background:linear-gradient(135deg, var(--success), #4ecdc4); color:#08080f;
             border-color:var(--success); box-shadow:0 0 16px rgba(0,255,136,0.3); }
  .btn-no { background:transparent; border-color:var(--text-dim); color:var(--text-dim); }
  .btn-no:hover { border-color:var(--danger); color:var(--danger); }

  .result { display:none; padding:28px 24px; text-align:center; }
  .result-icon { font-size:44px; margin-bottom:12px; }
  .result-text { font-family:'Press Start 2P',monospace; font-size:11px; line-height:1.8; }
  .result-sub { font-size:12px; color:var(--text-dim); margin-top:10px; line-height:1.5; }

  .badge-unlock { display:none; margin-top:14px; padding:14px; background:var(--surface2);
                  border:2px solid var(--accent2); border-radius:10px;
                  animation:badgePop 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes badgePop { 0%{transform:scale(0.5);opacity:0} 100%{transform:scale(1);opacity:1} }
  .badge-icon { font-size:32px; }
  .badge-name { font-family:'Press Start 2P',monospace; font-size:10px; color:var(--accent2); margin-top:6px; }
  .badge-desc { font-size:11px; color:var(--text-dim); margin-top:4px; }
</style>
</head>
<body>

<div class="card">
  <!-- Step 1: Night or morning? -->
  <div id="timeCheckSection">
    <div class="header">
      <div class="sun">🌅</div>
      <div class="title">DAILY CHECK-IN</div>
      <div class="question" style="margin-top:10px;">
        Is this the <strong>morning after</strong> your bedtime, or are you still up?
      </div>
    </div>
    <div class="actions" style="padding:16px 24px 20px;">
      <button class="btn btn-yes" id="morningBtn">IT'S MORNING</button>
      <button class="btn btn-no" id="stillUpBtn">STILL UP</button>
    </div>
  </div>

  <!-- Step 2: The actual bedtime check (hidden initially) -->
  <div id="bedtimeCheckSection" style="display:none;">
    <div class="header">
      <div class="sun">☀️</div>
      <div class="title">MORNING CHECK-IN</div>
      <div class="question">
        Did you go to bed at <strong id="bedtimeDisplay">23:00</strong> last night?
      </div>
    </div>

    <div class="streak-bar" id="streakBar">
      <div class="streak-text" id="streakText">STREAK: 0 NIGHTS</div>
      <div class="streak-dots" id="streakDots"></div>
    </div>

    <div class="actions" id="actionBtns">
      <button class="btn btn-yes" id="yesBtn">YES, I DID!</button>
      <button class="btn btn-no" id="noBtn">NO...</button>
    </div>
  </div>

  <div class="result" id="resultSection">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-text" id="resultText"></div>
    <div class="result-sub" id="resultSub"></div>
    <div class="badge-unlock" id="badgeUnlock">
      <div class="badge-icon" id="newBadgeIcon"></div>
      <div class="badge-name" id="newBadgeName"></div>
      <div class="badge-desc" id="newBadgeDesc"></div>
    </div>
  </div>
</div>

<script src="morning-checkin-window.js"></script>
</body>
</html>
