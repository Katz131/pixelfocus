<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Todo of the Loom</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:radial-gradient(ellipse at 50% 10%,#15152e 0%,#08080f 55%);color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px}
  .card{max-width:600px}
  h1{font-family:'Press Start 2P',monospace;font-size:20px;color:#00ff88;text-shadow:0 0 10px rgba(0,255,136,0.35);margin-bottom:20px}
  p{color:#5a5a7e;font-size:14px;line-height:1.6;margin-bottom:16px}
  a{color:#00ff88;text-decoration:none}
  a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <h1>TODO OF THE LOOM</h1>
  <p>The demoralizing gamified To-do list</p>
  <p>Player profiles live at <code>/p/?id=YOUR_ID</code></p>
</div>
</body>
</html>
