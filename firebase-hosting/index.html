<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Todo of the Loom — Player Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#08080f;--surface:#12122a;--surface2:#1a1a3a;--accent:#00ff88;--accent2:#ff6b9d;--accent3:#4ecdc4;--gold:#ffd700;--flame:#ff8c3a;--flame-hot:#ffb64c;--text:#e0e0e0;--text-dim:#5a5a7e;--border:#2a2a4a}
  body{background:radial-gradient(ellipse at 50% 10%,#15152e 0%,var(--bg) 55%);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
  .top-bar{width:100%;background:var(--surface);border-bottom:2px solid var(--accent);padding:14px 24px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,255,136,0.12)}
  .top-bar h1{font-family:'Press Start 2P',monospace;font-size:16px;color:var(--accent);text-shadow:0 0 10px rgba(0,255,136,0.35)}
  .subtitle{text-align:center;padding:22px 20px 6px;font-size:13px;color:var(--text-dim);font-style:italic}

  /* Tabs */
  .tab-bar{display:flex;justify-content:center;gap:0;padding:20px 20px 0;max-width:500px;margin:0 auto;width:100%}
  .tab-btn{flex:1;padding:12px 8px;font-family:'Press Start 2P',monospace;font-size:9px;text-align:center;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);transition:all 200ms;letter-spacing:1px;text-transform:uppercase}
  .tab-btn:first-child{border-radius:8px 0 0 8px}
  .tab-btn:last-child{border-radius:0 8px 8px 0}
  .tab-btn.active{background:var(--accent);color:#08080f;border-color:var(--accent);box-shadow:0 0 14px rgba(0,255,136,0.25)}
  .tab-btn:not(.active):hover{border-color:var(--accent);color:var(--text)}

  .section-label{text-align:center;padding:24px 20px 16px;font-family:'Press Start 2P',monospace;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:3px}

  /* Leaderboard */
  .leaderboard{max-width:700px;margin:0 auto;padding:0 24px 32px;width:100%}
  .lb-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;gap:14px;align-items:center;margin-bottom:8px;text-decoration:none;color:inherit;transition:border-color 200ms,box-shadow 200ms;cursor:pointer}
  .lb-row:hover{border-color:var(--gold);box-shadow:0 0 14px rgba(255,215,0,0.12)}
  .lb-row.rank-1{border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,0.18)}
  .lb-row.rank-2{border-color:#c0c0c0;box-shadow:0 0 14px rgba(192,192,192,0.12)}
  .lb-row.rank-3{border-color:#cd7f32;box-shadow:0 0 14px rgba(205,127,50,0.12)}
  .lb-rank{font-family:'Press Start 2P',monospace;font-size:16px;width:40px;text-align:center;flex-shrink:0}
  .lb-rank.r1{color:var(--gold)}
  .lb-rank.r2{color:#c0c0c0}
  .lb-rank.r3{color:#cd7f32}
  .lb-rank.rn{color:var(--text-dim);font-size:12px}
  .lb-avatar{width:48px;height:48px;border-radius:8px;border:2px solid var(--accent3);background:#08080f;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
  .lb-avatar img{image-rendering:pixelated;width:100%;height:100%}
  .lb-avatar .no-av{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--text-dim);text-align:center;line-height:1.3}
  .lb-info{display:flex;flex-direction:column;gap:3px;flex:1;overflow:hidden}
  .lb-name{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lb-meta{display:flex;gap:10px;font-size:10px;color:var(--text-dim);flex-wrap:wrap}
  .lb-meta .lv{color:var(--accent3)}
  .lb-meta .streak{color:var(--flame-hot)}
  .lb-score{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--gold);flex-shrink:0;text-align:right}
  .lb-score-label{font-size:8px;color:var(--text-dim);font-family:'Press Start 2P',monospace;text-align:right;margin-top:2px}

  /* Player grid */
  .grid{max-width:1100px;margin:0 auto;padding:0 24px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;width:100%}
  .player-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;display:flex;gap:16px;align-items:center;cursor:pointer;transition:border-color 200ms,box-shadow 200ms;text-decoration:none;color:inherit}
  .player-card:hover{border-color:var(--accent);box-shadow:0 0 16px rgba(0,255,136,0.15)}
  .card-avatar{width:64px;height:64px;border-radius:8px;border:2px solid var(--accent3);background:#08080f;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
  .card-avatar img{image-rendering:pixelated;width:100%;height:100%}
  .card-avatar .no-av{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-dim);text-align:center;line-height:1.4}
  .card-info{display:flex;flex-direction:column;gap:4px;overflow:hidden}
  .card-name{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-title{font-size:11px;color:var(--gold);font-family:'Press Start 2P',monospace}
  .card-meta{display:flex;gap:10px;font-size:11px;color:var(--text-dim);flex-wrap:wrap}
  .card-meta .lv{color:var(--accent3)}
  .card-meta .streak{color:var(--flame-hot)}
  .card-meta .blocks{color:var(--gold)}
  .loading{text-align:center;padding:80px 20px;font-family:'Press Start 2P',monospace;font-size:12px;color:var(--text-dim)}
  .empty{text-align:center;padding:80px 20px;font-family:'Press Start 2P',monospace;font-size:11px;color:var(--text-dim);line-height:2}
  .cta-bar{text-align:center;padding:16px;margin:0 auto;max-width:500px}
  .cta-bar a{color:var(--accent);font-family:'Press Start 2P',monospace;font-size:10px;text-decoration:none;letter-spacing:1px}
  .cta-bar a:hover{text-decoration:underline}
  .nav-link{display:inline-block;font-family:'Press Start 2P',monospace;font-size:9px;text-decoration:none;padding:8px 14px;border:1px solid var(--border);border-radius:8px;transition:border-color 200ms,box-shadow 200ms;letter-spacing:1px}
  .nav-link:hover{border-color:var(--accent);box-shadow:0 0 12px rgba(0,255,136,0.15)}
  .nav-link.accent{color:var(--accent)}
  .site-nav{text-align:center;padding:14px 20px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
  .tab-panel{display:none}
  .tab-panel.active{display:block}
  @media(max-width:680px){.grid{grid-template-columns:1fr} .lb-score{font-size:11px} .tab-btn{font-size:7px;padding:10px 4px}}
</style>
</head>
<body>
<div class="top-bar"><h1>TODO OF THE LOOM</h1></div>
<div class="subtitle">The demoralizing gamified To-do list</div>

<div class="tab-bar" id="tabBar" style="display:none;">
  <div class="tab-btn active" data-tab="leaderboard">Leaderboard</div>
  <div class="tab-btn" data-tab="weavers">All Weavers</div>
</div>

<div id="loadingView" class="loading">Loading weavers...</div>

<div id="leaderboardPanel" class="tab-panel active">
  <div class="section-label">TEXTILE LEADERBOARD</div>
  <div class="leaderboard" id="leaderboard"></div>
</div>

<div id="weaversPanel" class="tab-panel">
  <div class="section-label">ALL WEAVERS</div>
  <div class="grid" id="gridView"></div>
</div>

<div id="emptyView" class="empty" style="display:none;">No profiles synced yet.<br>Be the first weaver on the board.</div>

<div class="site-nav">
  <a class="nav-link accent" id="openTodoBtn" href="#" style="display:none;">&larr; TO-DO LIST</a>
  <a class="nav-link accent" href="https://chromewebstore.google.com/detail/pixelfocus/jlfiokfngdjebicfaagoeiciihbfeeil" target="_blank">GET TODO OF THE LOOM &rarr;</a>
</div>
<script>
// Detect extension and show TO-DO LIST button
(function(){
  // Try the Chrome Web Store extension ID first
  var storeId = 'jlfiokfngdjebicfaagoeiciihbfeeil';
  var tryIds = [storeId];
  // Also try detecting via a well-known resource
  function tryExtUrl(extId) {
    var url = 'chrome-extension://' + extId + '/icons/icon16.png';
    var img = new Image();
    img.onload = function() {
      var btn = document.getElementById('openTodoBtn');
      if (btn) { btn.href = 'chrome-extension://' + extId + '/popup.html'; btn.style.display = ''; }
    };
    img.src = url;
  }
  tryIds.forEach(tryExtUrl);
})();
</script>

<script>
(function() {
  'use strict';
  var PROJECT_ID = 'todo-of-the-loom';
  var API_KEY = 'AIzaSyCd200oa970-M-sDbcEn4U7dfENVBm4FOA';
  var BASE = 'https://firestore.googleapis.com/v1/projects/' + PROJECT_ID + '/databases/(default)/documents';

  // Tab switching
  var tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(function(tab) {
    tab.addEventListener('click', function() {
      tabs.forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      var target = tab.getAttribute('data-tab');
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      document.getElementById(target + 'Panel').classList.add('active');
    });
  });

  fetch(BASE + '/profiles?key=' + API_KEY + '&pageSize=200')
    .then(function(r) {
      if (!r.ok) throw new Error('fetch_failed');
      return r.json();
    })
    .then(function(data) {
      var docs = data.documents || [];
      document.getElementById('loadingView').style.display = 'none';
      if (docs.length === 0) {
        document.getElementById('emptyView').style.display = 'block';
        return;
      }
      document.getElementById('tabBar').style.display = 'flex';
      var players = docs.map(function(doc) {
        var d = parseDoc(doc.fields || {});
        var parts = doc.name.split('/');
        d._id = parts[parts.length - 1];
        return d;
      });

      var byTextiles = players.slice().sort(function(a, b) {
        return (parseInt(b.lifetimeBlocks, 10) || 0) - (parseInt(a.lifetimeBlocks, 10) || 0);
      });
      renderLeaderboard(byTextiles);

      var byLevel = players.slice().sort(function(a, b) {
        var lvDiff = (b.level || 1) - (a.level || 1);
        if (lvDiff !== 0) return lvDiff;
        return (b.streak || 0) - (a.streak || 0);
      });
      renderGrid(byLevel);
    })
    .catch(function() {
      document.getElementById('loadingView').textContent = 'Failed to load directory. Try again later.';
    });

  function parseDoc(fields) {
    var obj = {};
    Object.keys(fields).forEach(function(k) { obj[k] = parseVal(fields[k]); });
    return obj;
  }
  function parseVal(v) {
    if (!v) return null;
    if ('stringValue' in v) return v.stringValue;
    if ('integerValue' in v) return parseInt(v.integerValue, 10);
    if ('doubleValue' in v) return v.doubleValue;
    if ('booleanValue' in v) return v.booleanValue;
    if ('nullValue' in v) return null;
    if ('mapValue' in v) return parseDoc(v.mapValue.fields || {});
    if ('arrayValue' in v) return (v.arrayValue.values || []).map(parseVal);
    return null;
  }
  function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  function fmtNum(n) {
    n = parseInt(n, 10) || 0;
    if (n < 1000) return String(n);
    if (n < 10000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
    if (n < 1000000) return Math.round(n / 1000) + 'k';
    return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  }

  function renderLeaderboard(players) {
    document.getElementById('leaderboardPanel').classList.add('active');
    var lb = document.getElementById('leaderboard');
    var html = '';
    players.forEach(function(d, i) {
      var rank = i + 1;
      var rankCls = rank <= 3 ? 'r' + rank : 'rn';
      var rowCls = rank <= 3 ? ' rank-' + rank : '';
      var avatarHtml = d.avatarDataURL
        ? '<img src="' + d.avatarDataURL + '" alt="">'
        : '<div class="no-av">NO<br>AV</div>';
      var textiles = parseInt(d.lifetimeBlocks, 10) || 0;
      html += '<a class="lb-row' + rowCls + '" href="/p/?id=' + esc(d._id) + '">'
        + '<div class="lb-rank ' + rankCls + '">#' + rank + '</div>'
        + '<div class="lb-avatar">' + avatarHtml + '</div>'
        + '<div class="lb-info">'
        + '<div class="lb-name">' + esc(d.displayName || 'Unknown Weaver') + '</div>'
        + '<div class="lb-meta">'
        + '<span class="lv">LV ' + (d.level || 1) + '</span>'
        + '<span class="streak">\u{1F525} ' + (d.streak || 0) + '</span>'
        + '</div></div>'
        + '<div style="text-align:right;">'
        + '<div class="lb-score">' + fmtNum(textiles) + '</div>'
        + '<div class="lb-score-label">textiles</div>'
        + '</div></a>';
    });
    lb.innerHTML = html;
  }

  function renderGrid(players) {
    var grid = document.getElementById('gridView');
    var html = '';
    players.forEach(function(d) {
      var avatarHtml = d.avatarDataURL
        ? '<img src="' + d.avatarDataURL + '" alt="">'
        : '<div class="no-av">NO<br>AV</div>';
      html += '<a class="player-card" href="/p/?id=' + esc(d._id) + '">'
        + '<div class="card-avatar">' + avatarHtml + '</div>'
        + '<div class="card-info">'
        + '<div class="card-name">' + esc(d.displayName || 'Unknown Weaver') + '</div>'
        + '<div class="card-title">' + esc(d.title || 'Would-Be Weaver') + '</div>'
        + '<div class="card-meta">'
        + '<span class="lv">LV ' + (d.level || 1) + '</span>'
        + '<span class="streak">\u{1F525} ' + (d.streak || 0) + '</span>'
        + '<span class="blocks">' + fmtNum(d.lifetimeBlocks) + ' textiles</span>'
        + '</div></div></a>';
    });
    grid.innerHTML = html;
  }
})();
</script>
</body>
</html>
