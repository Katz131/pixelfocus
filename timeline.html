<!DOCTYPE html>
<!--
  =============================================================================
  !!! NEVER A POPUP !!! NEVER A POPUP !!! NEVER A POPUP !!! NEVER A POPUP !!!
  =============================================================================
  Timeline — v3.21.83

  A full browser tab showing every narrative event the player has experienced,
  in reverse chronological order. No spoilers — only shows events already fired.
  Each card shows the title, description, flavor text, consequences, and when
  it happened. Data comes from state.eventHistory + events-catalog.js.
  =============================================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo of the Loom - Event Timeline</title>
<link rel="stylesheet" href="fonts.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #08080f;
    --surface: #12122a;
    --surface2: #1a1a3a;
    --accent: #00ff88;
    --accent2: #ff6b9d;
    --accent3: #4ecdc4;
    --gold: #ffd700;
    --text: #e8e6e3;
    --text-dim: #8888aa;
    --border: #2a2a4a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  .header {
    text-align: center;
    padding: 32px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: var(--accent3);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .header .subtitle {
    font-size: 11px;
    color: var(--text-dim);
  }

  .timeline {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px;
    margin-bottom: 16px;
    position: relative;
    transition: border-color 0.2s;
  }
  .event-card:hover {
    border-color: rgba(78,205,196,0.3);
  }

  .event-tier {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .event-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .event-desc {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .event-flavor {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.6;
    margin-bottom: 14px;
    padding-left: 12px;
    border-left: 2px solid rgba(78,205,196,0.2);
  }

  .event-consequences {
    border-top: 1px solid rgba(255,255,255,0.05);
    padding-top: 10px;
    margin-top: 4px;
  }
  .event-consequences .label {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .consequence-item {
    background: rgba(0,0,0,0.25);
    border-radius: 4px;
    padding: 6px 10px;
    margin-bottom: 4px;
    font-size: 11px;
    color: var(--text);
    border-left: 3px solid var(--gold);
  }
  .consequence-item.negative {
    border-left-color: #ff6b6b;
  }
  .consequence-item.positive {
    border-left-color: var(--accent);
  }
  .consequence-item.neutral {
    border-left-color: var(--accent3);
  }

  .event-date {
    font-size: 10px;
    color: var(--text-dim);
    text-align: right;
    margin-top: 10px;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }
  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .empty-state .message {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    line-height: 2;
  }

  .nav-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    justify-content: center;
    gap: 10px;
    z-index: 100;
  }
  .nav-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--accent3);
    background: transparent;
    border: 1px solid var(--accent3);
    border-radius: 4px;
    padding: 8px 14px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s, color 0.2s;
  }
  .nav-btn:hover {
    background: rgba(78,205,196,0.1);
  }
  .nav-btn.gold {
    color: var(--gold);
    border-color: var(--gold);
  }
  .nav-btn.gold:hover {
    background: rgba(255,215,0,0.1);
  }

  .event-count {
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  /* Active thread indicators */
  .active-threads {
    max-width: 720px;
    margin: 0 auto 0;
    padding: 0 16px;
  }
  .thread-banner {
    background: rgba(255,159,67,0.06);
    border: 1px solid rgba(255,159,67,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 12px;
  }
  .thread-banner .thread-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: #ff9f43;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .thread-banner .thread-desc {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="header">
  <h1>EVENT TIMELINE</h1>
  <div class="subtitle">A record of everything that has happened at the mill.</div>
</div>

<div id="activeThreads" class="active-threads"></div>
<div id="timeline" class="timeline"></div>

<div class="nav-bar">
  <button class="nav-btn" id="toProfileBtn" type="button">PROFILE</button>
  <button class="nav-btn" id="toFactoryBtn" type="button">FACTORY</button>
  <button class="nav-btn" id="toHouseBtn" type="button">HOUSE</button>
  <button class="nav-btn gold" id="backToTrackerBtn" type="button">&#8592; TO-DO LIST</button>
</div>

<script src="events-catalog.js"></script>
<script src="timeline-window.js"></script>
</body>
</html>
