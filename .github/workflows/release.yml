name: Release

# Fires whenever you push a version tag like v3.19.10.
# Builds the extension zip and attaches it to a GitHub Release.
#
# To cut a new release:
#   1) Bump version in manifest.json, app.js, popup.html, factory.html,
#      fonts.css, package-extension.bat (six places — script verifies).
#   2) git add -A && git commit -m "v3.19.11"
#   3) git tag v3.19.11 && git push && git push --tags
#   4) This workflow builds pixelfocus-v3.19.11.zip and publishes it.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building release for tag=$TAG version=$VERSION"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(grep -oP '"version"\s*:\s*"\K[^"]+' manifest.json)
          EXPECTED="${{ steps.version.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$EXPECTED" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag ($EXPECTED)"
            exit 1
          fi
          echo "manifest.json version $MANIFEST_VERSION matches tag $EXPECTED"

      - name: Stage extension files
        run: |
          # Use a fixed folder name so every release extracts to the same
          # path. This prevents Chrome from assigning a new extension ID
          # when users unzip an update — a different folder = different ID
          # = wiped chrome.storage.local = lost progress.
          STAGING="staging/pixelfocus"
          mkdir -p "$STAGING/icons"
          # Copy only the files that ship in the extension — not the
          # build scripts, README, LICENSE, docs/, or .github/.
          for f in manifest.json background.js popup.html app.js \
                   gallery.html gallery.js gallery-dispatch.js \
                   factory.html factory.js factory-dispatch.js \
                   stage-entries.js msglog.js sounds.js tips.js \
                   tooltip.js fonts.css personnel.js research.js \
                   incinerator.js incinerator.html incinerator-window.js \
                   employees.html employees.js research.html research-window.js \
                   house.js house.html house-window.js house-dispatch.js \
                   popup-dispatch.js ratiocinatory.html ratiocinatory.js \
                   ratiocinatory-dispatch.js patsy-names.js \
                   profile.html profile-window.js \
                   events.js events-modal.js events-catalog.js \
                   firebase-sync.js lockout-guard.js \
                   surveillance-nag.html surveillance-nag-window.js \
                   promise-timer.html promise-timer.js \
                   penalty-timer.html penalty-timer.js \
                   bureau.html bureau.js bureau-window.js \
                   challenge.html challenge-window.js \
                   timeline.html timeline-window.js \
                   preview-daily-tasks.html preview-profile.html \
                   resize-icon.html \
                   badges.html badges-window.js \
                   bedtime-reminder.html bedtime-window.js \
                   block-alert.html \
                   brokerage.html brokerage-window.js \
                   market-engine.js market-events.js \
                   morning-checkin.html morning-checkin-window.js \
                   app-main.js tutorial-data.js tutorial-ui.js \
                   morse-messenger.js morse-preview.html \
                   pet-sprites.html pet-sprites-window.js \
                   btn-sounds.js; do
            if [ -f "$f" ]; then
              cp "$f" "$STAGING/$f"
              echo "  + $f"
            else
              echo "  - $f (missing, skipped)"
            fi
          done
          if [ -d icons ]; then
            cp icons/*.png "$STAGING/icons/" 2>/dev/null || true
          fi
          ls -la "$STAGING"

      - name: Create zip
        id: zip
        run: |
          cd staging
          ZIP_NAME="pixelfocus-v${{ steps.version.outputs.version }}.zip"
          zip -r "../$ZIP_NAME" "pixelfocus"
          cd ..
          ls -la "$ZIP_NAME"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_path=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Todo of the Loom ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.zip.outputs.zip_path }}
      