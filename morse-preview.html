<!DOCTYPE html>
<html><head>
<title>Morse Code Messenger Preview</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
body { margin:0; background:#0a0f0a; color:#ccc; font-family:monospace; }
</style>
</head><body>
<div style="text-align:center;padding:20px;">
  <button id="openBtn" style="background:rgba(255,215,0,0.15);border:2px solid #ffd700;color:#ffd700;font-family:'Press Start 2P',monospace;font-size:10px;padding:12px 24px;border-radius:8px;cursor:pointer;">OPEN MORSE MESSENGER</button>
  <div style="margin-top:12px;font-size:10px;color:#666;">Click to preview the morse code composer</div>
</div>
<script src="morse-messenger.js"></script>
<script>
document.getElementById('openBtn').onclick = function() {
  MorseMessenger.open('test123', 'Giulia', 'myprofile', function(targetId, msg) {
    console.log('Would send to', targetId, msg);
    alert('Message sent!\n\nMorse: ' + msg.morseText + '\nDecodes to: ' + MorseMessenger.decode(msg.morseText));
  });
};
</script>
</body></html>
