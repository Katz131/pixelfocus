<!DOCTYPE html>
<!--
  Penalty Timer Window — v3.22.93
  A pop-out 3-minute countdown triggered on the 3rd consecutive NO or close
  on the surveillance nag. This is NOT a promise — the player refused three
  times. Start a focus timer to cancel the penalty, or lose $300.
  Closing the window doesn't help — background.js enforces the penalty.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo of the Loom — Penalty Timer</title>
<link rel="stylesheet" href="fonts.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #08080f;
  --surface: #12122a;
  --danger: #ff4466;
  --danger-dim: #ff2244;
  --gold: #ffd700;
  --text: #e0e0e0;
  --text-dim: #5a5a7e;
  --border: #2a2a4a;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.penalty-card {
  background: var(--surface);
  border: 2px solid var(--danger);
  border-radius: 14px;
  padding: 28px 32px;
  max-width: 420px;
  width: 100%;
  text-align: center;
  box-shadow: 0 0 40px rgba(255,68,102,0.25);
  transition: all 0.4s;
  animation: penaltyPulse 2s ease-in-out infinite;
}
@keyframes penaltyPulse {
  0%,100% { box-shadow: 0 0 40px rgba(255,68,102,0.25); }
  50% { box-shadow: 0 0 60px rgba(255,68,102,0.45); }
}
.penalty-card.urgent {
  animation: penaltyUrgent 0.8s ease-in-out infinite;
}
@keyframes penaltyUrgent {
  0%,100% { box-shadow: 0 0 40px rgba(255,68,102,0.4); }
  50% { box-shadow: 0 0 70px rgba(255,34,68,0.6); }
}
.penalty-card.success {
  border-color: var(--gold);
  box-shadow: 0 0 50px rgba(255,215,0,0.35);
  animation: none;
}
.penalty-card.applied {
  border-color: var(--danger-dim);
  box-shadow: 0 0 50px rgba(255,34,68,0.5);
  animation: none;
}
.penalty-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  color: var(--danger);
  letter-spacing: 2px;
  margin-bottom: 16px;
}
.timer-display {
  font-family: 'Press Start 2P', monospace;
  font-size: 36px;
  color: var(--danger);
  margin: 16px 0;
  text-shadow: 0 0 15px rgba(255,68,102,0.4);
  transition: color 0.3s;
}
.timer-display.urgent {
  animation: timerPulse 0.5s ease-in-out infinite;
}
@keyframes timerPulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.6; }
}
.progress-bar {
  width: 100%;
  height: 6px;
  background: #15102a;
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin: 12px 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--danger), #ff8866);
  transition: width 1s linear;
  box-shadow: 0 0 8px rgba(255,68,102,0.4);
}
.penalty-text {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
  margin: 12px 0;
}
.penalty-text em {
  color: var(--danger);
  font-style: normal;
  font-weight: bold;
}
.penalty-amount {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--danger);
  letter-spacing: 1px;
  margin-top: 12px;
  text-shadow: 0 0 10px rgba(255,68,102,0.3);
}
.escape-hint {
  font-size: 9px;
  color: var(--text-dim);
  margin-top: 10px;
  font-style: italic;
}
.result-msg {
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  line-height: 2;
  display: none;
}
.result-msg.success { color: var(--gold); }
.result-msg.applied { color: var(--danger); }
</style>
</head>
<body>

<div class="penalty-card" id="penaltyCard">
  <div class="penalty-title" id="penaltyTitle">PENALTY INCOMING</div>
  <div class="timer-display" id="timerDisplay">3:00</div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:100%;"></div>
  </div>
  <div class="penalty-text" id="penaltyText">
    You said <em>NO</em> three times. That's your limit.<br>
    Start a focus timer before this runs out or lose the money.
  </div>
  <div class="penalty-amount">-$300</div>
  <div class="escape-hint">Start a focus timer to cancel. Closing this window won't save you.</div>
  <div class="result-msg" id="resultMsg"></div>
</div>

<script src="penalty-timer.js"></script>
</body>
</html>
